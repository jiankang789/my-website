<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>AI图片短视频生成测试器</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app mini-app">
      <header class="hero mini-hero">
        <div>
          <p class="eyebrow">AI Video Hook Test</p>
          <h1>AI图片短视频生成测试器</h1>
          <p class="lead">先跑通最小功能：上传一张图片、上传一段声音、填写文案，直接生成一个可预览、可下载的竖屏短视频。</p>
        </div>
      </header>

      <section class="mini-layout">
        <section class="panel tool-panel active">
          <div class="tool-head">
            <h2>图片 + 声音 + 文案生成短视频</h2>
            <button type="button" id="fillDemo" class="ghost">填入示例</button>
          </div>

          <div class="grid-2">
            <label>门店/品牌名称
              <input id="name" placeholder="例如：悦容轻抗衰管理中心">
            </label>
            <label>主推项目
              <input id="product" placeholder="例如：喷射抗衰提升项目">
            </label>
          </div>

          <div class="upload-grid">
            <label class="upload-card">上传图片
              <input id="imageFile" type="file" accept="image/*">
              <img id="imagePreview" alt="">
              <span>建议上传人物、门店、产品、案例图</span>
            </label>
            <label class="upload-card">上传声音
              <input id="imageAudio" type="file" accept="audio/*">
              <audio id="imageAudioPreview" controls></audio>
              <span>支持口播、讲解、品牌音色；不上传也能生成静音视频</span>
            </label>
          </div>

          <label>视频文案/字幕
            <textarea id="imageCopy" rows="5" placeholder="例如：做轻抗衰之前，先判断自己适不适合。别急着下单，先做一次AI项目适配诊断。"></textarea>
          </label>

          <div class="actions">
            <button type="button" id="runImageVideo" class="primary">生成短视频</button>
            <button type="button" id="copyResult" class="ghost">复制文案方案</button>
          </div>

          <div class="video-maker">
            <canvas id="imageVideoCanvas" width="720" height="1280"></canvas>
            <video id="generatedImageVideo" controls playsinline></video>
            <a id="downloadImageVideo" class="download-link" download="AI获客短视频.webm">下载生成的视频</a>
          </div>

          <div id="imageOutput" class="result-box"></div>
          <p id="toast" class="toast" role="status" aria-live="polite"></p>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
