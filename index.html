<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>短视频工作台</title>
    <link rel="icon" href="data:,">
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7f9;
        --surface: #ffffff;
        --surface-2: #eef3f4;
        --ink: #17202a;
        --muted: #65717d;
        --line: #d8e0e4;
        --brand: #0f766e;
        --brand-dark: #0b5d57;
        --accent: #b45309;
        --blue: #2563eb;
        --red: #dc2626;
        --shadow: 0 12px 28px rgba(24, 36, 48, 0.08);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
        letter-spacing: 0;
      }

      button, input, textarea, select { font: inherit; }

      button {
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--surface);
        color: var(--ink);
        cursor: pointer;
      }

      button:hover { border-color: var(--brand); }

      .primary {
        border-color: var(--brand);
        background: var(--brand);
        color: #fff;
        font-weight: 700;
      }

      .danger { color: var(--red); }

      input, textarea, select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fff;
        color: var(--ink);
        padding: 9px 10px;
      }

      textarea { resize: vertical; min-height: 84px; }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 260px 1fr;
      }

      .sidebar {
        border-right: 1px solid var(--line);
        background: #10232b;
        color: #f8fbfb;
        padding: 20px;
      }

      .brand {
        font-size: 22px;
        font-weight: 900;
        margin-bottom: 6px;
      }

      .subtitle {
        color: #a8c0c7;
        font-size: 13px;
        line-height: 1.6;
        margin-bottom: 22px;
      }

      .nav {
        display: grid;
        gap: 8px;
      }

      .nav button {
        width: 100%;
        text-align: left;
        background: transparent;
        color: #dbeafe;
        border-color: rgba(255,255,255,0.12);
        padding: 10px 12px;
      }

      .nav button.active {
        background: #e9f7f4;
        color: #0f3d3a;
        border-color: #e9f7f4;
        font-weight: 800;
      }

      .side-metrics {
        display: grid;
        gap: 10px;
        margin-top: 22px;
      }

      .side-metric {
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 8px;
        padding: 12px;
        background: rgba(255,255,255,0.05);
      }

      .side-metric b { display: block; font-size: 24px; }
      .side-metric span { color: #a8c0c7; font-size: 12px; }

      .main {
        padding: 20px;
        overflow: auto;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 16px;
      }

      .topbar h1 {
        margin: 0;
        font-size: 24px;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .grid {
        display: grid;
        grid-template-columns: 1.05fr 1.35fr;
        gap: 16px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
        padding: 16px;
      }

      .panel h2 {
        margin: 0 0 12px;
        font-size: 17px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .full { grid-column: 1 / -1; }

      .pipeline {
        display: grid;
        grid-template-columns: repeat(6, minmax(132px, 1fr));
        gap: 10px;
      }

      .stage {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfdfd;
        min-height: 228px;
        padding: 10px;
      }

      .stage-head {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        margin-bottom: 8px;
      }

      .task {
        border: 1px solid #e1e8eb;
        border-left: 4px solid var(--brand);
        border-radius: 7px;
        background: #fff;
        padding: 9px;
        margin-bottom: 8px;
      }

      .task b {
        display: block;
        font-size: 13px;
        line-height: 1.35;
      }

      .task span {
        display: block;
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .task-actions {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }

      .task-actions button {
        min-height: 28px;
        padding: 0 8px;
        font-size: 12px;
      }

      .tabs {
        display: flex;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        width: fit-content;
        margin-bottom: 12px;
      }

      .tabs button {
        border: 0;
        border-radius: 0;
        padding: 8px 12px;
      }

      .tabs button.active {
        background: var(--brand);
        color: white;
        font-weight: 800;
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 820px;
        background: white;
      }

      th, td {
        border-bottom: 1px solid var(--line);
        padding: 10px;
        text-align: left;
        vertical-align: top;
        font-size: 13px;
      }

      th {
        background: var(--surface-2);
        color: #34414a;
        font-size: 12px;
      }

      .status {
        display: inline-block;
        border-radius: 999px;
        padding: 4px 8px;
        background: #e8f5f3;
        color: var(--brand-dark);
        font-size: 12px;
        font-weight: 800;
      }

      .script-box {
        white-space: pre-wrap;
        line-height: 1.65;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfdfd;
        padding: 12px;
        min-height: 240px;
      }

      .module-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .module-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfdfd;
        padding: 12px;
        display: grid;
        gap: 8px;
      }

      .module-card h3 {
        margin: 0;
        font-size: 15px;
      }

      .module-card p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .module-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .module-meta span {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 4px 8px;
        background: #fff;
        color: var(--muted);
        font-size: 12px;
      }

      .checklist {
        display: grid;
        gap: 10px;
      }

      .check-row {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        color: var(--ink);
        background: #fff;
      }

      .check-row input { width: auto; margin-top: 3px; }
      .check-row small { color: var(--muted); display: block; margin-top: 3px; }

      .hidden { display: none !important; }

      @media (max-width: 1180px) {
        .shell { grid-template-columns: 1fr; }
        .sidebar { position: sticky; top: 0; z-index: 2; }
        .grid { grid-template-columns: 1fr; }
        .pipeline { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }

      @media (max-width: 680px) {
        .main, .sidebar { padding: 14px; }
        .topbar { align-items: flex-start; flex-direction: column; }
        .form-grid { grid-template-columns: 1fr; }
        .pipeline { grid-template-columns: 1fr; }
        .module-list { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">短视频工作台</div>
        <div class="subtitle">人设、选题、脚本、素材、数字人、发布记录，一条线管理。</div>
        <nav class="nav">
          <button class="active" data-view="dashboard">生产看板</button>
          <button data-view="script">脚本工作区</button>
          <button data-view="avatar">数字人素材</button>
          <button data-view="publish">发布追踪</button>
          <button data-view="modules">开源模块</button>
        </nav>
        <div class="side-metrics">
          <div class="side-metric"><b id="metricTotal">0</b><span>总选题</span></div>
          <div class="side-metric"><b id="metricToday">0</b><span>今日待推进</span></div>
          <div class="side-metric"><b id="metricReady">0</b><span>可发布成片</span></div>
        </div>
      </aside>

      <main class="main">
        <div class="topbar">
          <div>
            <h1>美业招商短视频生产线</h1>
          </div>
          <div class="actions">
            <button id="seedBtn">填入示例</button>
            <button id="exportJsonBtn">导出 JSON</button>
            <button id="exportCsvBtn">导出 CSV</button>
            <button class="danger" id="clearBtn">清空本地数据</button>
          </div>
        </div>

        <section id="view-dashboard" class="view">
          <div class="grid">
            <div class="panel">
              <h2>新增选题</h2>
              <div class="form-grid">
                <label>选题标题<input id="topicTitle" value="美业老板为什么越做越累"></label>
                <label>目标客户<input id="topicAudience" value="美容院老板 / 美业创业者"></label>
                <label>视频类型
                  <select id="topicType">
                    <option>痛点教育</option>
                    <option>招商转化</option>
                    <option>案例拆解</option>
                    <option>认知干货</option>
                    <option>直播预热</option>
                  </select>
                </label>
                <label>导流口令<input id="topicCta" value="招商"></label>
                <label class="full">核心卖点<textarea id="topicOffer">把短视频、私域、成交话术和招商模型打通，帮门店建立稳定获客系统。</textarea></label>
                <label class="full">痛点<textarea id="topicPain">门店每天发内容，但没有咨询；活动越做越低价，利润越来越薄。</textarea></label>
              </div>
              <div class="actions" style="margin-top:12px">
                <button class="primary" id="addTopicBtn">加入生产线</button>
                <button id="generateScriptBtn">生成脚本</button>
              </div>
            </div>

            <div class="panel">
              <h2>流程看板</h2>
              <div class="pipeline" id="pipeline"></div>
            </div>
          </div>
        </section>

        <section id="view-script" class="view hidden">
          <div class="grid">
            <div class="panel">
              <h2>脚本模板</h2>
              <div class="tabs">
                <button class="active" data-template="direct">招商成交</button>
                <button data-template="teacher">讲师干货</button>
                <button data-template="case">案例反转</button>
              </div>
              <label>当前选题
                <select id="topicSelect"></select>
              </label>
              <div class="actions" style="margin-top:12px">
                <button class="primary" id="rewriteSelectedBtn">按模板重写</button>
                <button id="copyScriptBtn">复制脚本</button>
                <button id="createLiketongPackageBtn">生成立客通素材包</button>
              </div>
              <div class="script-box" id="liketongPackageResult" style="min-height:96px;margin-top:12px;color:var(--muted)">素材包生成后，文件夹路径会显示在这里。</div>
            </div>
            <div class="panel">
              <h2>口播脚本</h2>
              <div class="script-box" id="scriptPreview"></div>
            </div>
          </div>
        </section>

        <section id="view-avatar" class="view hidden">
          <div class="grid">
            <div class="panel">
              <h2>数字人人设</h2>
              <div class="form-grid">
                <label>身份<input id="personaRole" value="54岁美业招商讲师"></label>
                <label>气质<input id="personaTone" value="亲和、优雅、专业、可信"></label>
                <label>穿搭<input id="personaOutfit" value="职业装 / 白衬衫 / 深色西装"></label>
                <label>用途<input id="personaUse" value="招商、课程转化、加盟咨询"></label>
                <label class="full">表达原则<textarea id="personaRule">像老师讲清楚，不像销售硬推；用真实视频保相似度，口型同步工具负责新文案。</textarea></label>
              </div>
            </div>
            <div class="panel">
              <h2>素材检查</h2>
              <div class="checklist">
                <label class="check-row"><input type="checkbox" class="assetCheck"><span>真人底片<small>竖屏、正脸、无字幕、无滤镜、背景干净。</small></span></label>
                <label class="check-row"><input type="checkbox" class="assetCheck"><span>男声配音<small>成熟、稳重、亲和，不要播音腔太重。</small></span></label>
                <label class="check-row"><input type="checkbox" class="assetCheck"><span>口型同步工具<small>立客通、剪映数字人、即梦、HeyGen、D-ID 或本地方案。</small></span></label>
                <label class="check-row"><input type="checkbox" class="assetCheck"><span>招商包装模板<small>标题、身份条、重点字幕、导流口令。</small></span></label>
                <label class="check-row"><input type="checkbox" class="assetCheck"><span>发布素材<small>封面标题、评论区话术、私信回复。</small></span></label>
              </div>
            </div>
            <div class="panel full">
              <h2>立客通接入</h2>
              <div class="form-grid">
                <label>客户端路径
                  <input value="D:\ai-tools\liketong-ai-employee\app\立客通AI员工.exe" readonly>
                </label>
                <label>交接目录
                  <input value="digital-human-mvp/liketong-inbox" readonly>
                </label>
                <label class="full">接入方式
                  <textarea readonly>第一版采用文件夹交接：工作台生成脚本和素材清单，立客通负责真人口型同步，导出的 MP4 放回 liketong-output，再由工作台做招商包装和发布追踪。</textarea>
                </label>
              </div>
              <div class="actions" style="margin-top:12px">
                <button id="copyLiketongPathBtn" type="button">复制客户端路径</button>
                <button id="copyLiketongStepsBtn" type="button">复制操作步骤</button>
              </div>
            </div>
          </div>
        </section>

        <section id="view-publish" class="view hidden">
          <div class="panel">
            <h2>发布追踪表</h2>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>编号</th>
                    <th>选题</th>
                    <th>类型</th>
                    <th>阶段</th>
                    <th>导流口令</th>
                    <th>平台标题</th>
                    <th>发布时间</th>
                    <th>数据反馈</th>
                  </tr>
                </thead>
                <tbody id="publishRows"></tbody>
              </table>
            </div>
          </div>
        </section>

        <section id="view-modules" class="view hidden">
          <div class="panel">
            <h2>开源模块整合方案</h2>
            <p style="margin-top:0;color:var(--muted);line-height:1.7">先用工作台做总控台，再把下载、转写、仿写、声音、数字人、包装和发布做成可替换模块。</p>
            <div class="module-list" id="moduleList"></div>
          </div>
        </section>
      </main>
    </div>

    <script>
      const stages = ["选题", "脚本", "素材", "数字人", "包装", "发布"];
      const storeKey = "beauty_short_video_workbench_v1";
      let activeTemplate = "direct";
      let state = loadState();
      let pipelineModulesLoaded = false;

      function $(id) { return document.getElementById(id); }

      function renderPipelineModules(data) {
        const root = $("moduleList");
        if (!root) return;
        const modules = data.modules || [];
        if (!modules.length) {
          root.innerHTML = '<div class="module-card"><h3>暂无模块配置</h3><p>请检查 config/pipeline_modules.json。</p></div>';
          return;
        }
        root.innerHTML = modules.map((item) => `
          <article class="module-card">
            <h3>${item.name || item.id}</h3>
            <div class="module-meta">
              <span>${item.status || "planned"}</span>
              <span>${item.primary || ""}</span>
            </div>
            <p><b>输入：</b>${(item.input || []).join("、")}</p>
            <p><b>输出：</b>${(item.output || []).join("、")}</p>
            <p>${item.mvp || ""}</p>
          </article>
        `).join("");
      }

      async function loadPipelineModules() {
        if (pipelineModulesLoaded) return;
        pipelineModulesLoaded = true;
        const root = $("moduleList");
        if (root) root.innerHTML = '<div class="module-card"><h3>正在读取模块配置</h3><p>请稍候。</p></div>';
        try {
          const response = await fetch("api/pipeline-modules.json");
          const data = await response.json();
          renderPipelineModules(data);
        } catch (error) {
          if (root) root.innerHTML = `<div class="module-card"><h3>读取失败</h3><p>${error.message}</p></div>`;
        }
      }

      function loadState() {
        try {
          return JSON.parse(localStorage.getItem(storeKey)) || { topics: [], checks: [] };
        } catch {
          return { topics: [], checks: [] };
        }
      }

      function saveState() {
        localStorage.setItem(storeKey, JSON.stringify(state));
        render();
      }

      function currentInput() {
        return {
          title: $("topicTitle").value.trim(),
          audience: $("topicAudience").value.trim(),
          type: $("topicType").value,
          cta: $("topicCta").value.trim(),
          offer: $("topicOffer").value.trim(),
          pain: $("topicPain").value.trim()
        };
      }

      function buildScript(topic, template = activeTemplate) {
        const base = {
          hook: `${topic.audience}注意了，${topic.title}，真正的问题往往不在技术。`,
          pain: `很多门店卡住，是因为${topic.pain}`,
          offer: `我们要做的，是把${topic.offer}`,
          cta: `想要这套模型，私信我「${topic.cta}」。`
        };

        if (template === "teacher") {
          return `今天讲一个美业门店最容易忽略的问题。\n\n${base.hook}\n\n${base.pain}\n\n不要只盯着流量，要先把选题、信任、私域承接和成交话术连起来。\n\n${base.offer}\n\n${base.cta}`;
        }

        if (template === "case") {
          return `有个美业老板跟我说：老师，我每天都发视频，为什么还是没人咨询？\n\n我看完以后发现，不是她不努力，而是内容没有承接到成交。\n\n${base.pain}\n\n后来我们换了一套打法：先用痛点选题吸引精准客户，再用私域话术完成预约和招商转化。\n\n${base.offer}\n\n${base.cta}`;
        }

        return `${base.hook}\n\n${base.pain}\n\n以前靠活动、靠熟人、靠低价，现在越来越难。\n\n真正能长期赚钱的门店，一定要有一套稳定获客系统。\n\n${base.offer}\n\n${base.cta}`;
      }

      function addTopic() {
        const input = currentInput();
        if (!input.title) return;
        const item = {
          id: Date.now().toString(36),
          ...input,
          stage: "选题",
          script: buildScript(input),
          publishTitle: input.title,
          publishAt: "",
          feedback: "",
          createdAt: new Date().toISOString()
        };
        state.topics.unshift(item);
        saveState();
      }

      function moveTopic(id, direction) {
        const item = state.topics.find((topic) => topic.id === id);
        if (!item) return;
        const index = stages.indexOf(item.stage);
        item.stage = stages[Math.max(0, Math.min(stages.length - 1, index + direction))];
        saveState();
      }

      function deleteTopic(id) {
        state.topics = state.topics.filter((topic) => topic.id !== id);
        saveState();
      }

      function renderPipeline() {
        const root = $("pipeline");
        root.innerHTML = "";
        stages.forEach((stage) => {
          const column = document.createElement("div");
          column.className = "stage";
          const items = state.topics.filter((topic) => topic.stage === stage);
          column.innerHTML = `<div class="stage-head"><span>${stage}</span><span>${items.length}</span></div>`;
          items.forEach((topic) => {
            const task = document.createElement("div");
            task.className = "task";
            task.innerHTML = `
              <b>${topic.title}</b>
              <span>${topic.type} · 口令：${topic.cta}</span>
              <div class="task-actions">
                <button data-move="${topic.id}" data-dir="-1">←</button>
                <button data-move="${topic.id}" data-dir="1">→</button>
                <button class="danger" data-delete="${topic.id}">删</button>
              </div>
            `;
            column.appendChild(task);
          });
          root.appendChild(column);
        });
      }

      function renderSelect() {
        const select = $("topicSelect");
        select.innerHTML = "";
        state.topics.forEach((topic) => {
          const option = document.createElement("option");
          option.value = topic.id;
          option.textContent = topic.title;
          select.appendChild(option);
        });
        renderScriptPreview();
      }

      function selectedTopic() {
        const id = $("topicSelect").value;
        return state.topics.find((topic) => topic.id === id) || state.topics[0];
      }

      function renderScriptPreview() {
        const topic = selectedTopic();
        $("scriptPreview").textContent = topic ? topic.script : "先在生产看板里新增一个选题。";
      }

      function renderPublishRows() {
        $("publishRows").innerHTML = state.topics.map((topic, index) => `
          <tr>
            <td>${index + 1}</td>
            <td>${topic.title}</td>
            <td>${topic.type}</td>
            <td><span class="status">${topic.stage}</span></td>
            <td>${topic.cta}</td>
            <td>${topic.publishTitle || topic.title}</td>
            <td>${topic.publishAt || "待定"}</td>
            <td>${topic.feedback || "待记录"}</td>
          </tr>
        `).join("");
      }

      function renderMetrics() {
        $("metricTotal").textContent = state.topics.length;
        $("metricToday").textContent = state.topics.filter((topic) => topic.stage !== "发布").length;
        $("metricReady").textContent = state.topics.filter((topic) => topic.stage === "包装").length;
      }

      function renderChecks() {
        document.querySelectorAll(".assetCheck").forEach((box, index) => {
          box.checked = Boolean(state.checks[index]);
        });
      }

      function render() {
        renderPipeline();
        renderSelect();
        renderPublishRows();
        renderMetrics();
        renderChecks();
      }

      function seedDemo() {
        if (state.topics.length) return;
        state.topics = [
          {
            id: "demo1",
            title: "美业老板不是缺技术，是缺稳定获客系统",
            audience: "美容院老板",
            type: "招商转化",
            cta: "招商",
            offer: "短视频、私域、成交话术和招商模型打通",
            pain: "活动越做越低价，客户越来越难留住",
            stage: "脚本",
            publishTitle: "美业老板，不缺技术，缺的是获客系统",
            publishAt: "",
            feedback: "",
            createdAt: new Date().toISOString()
          },
          {
            id: "demo2",
            title: "为什么你的门店发视频没有咨询",
            audience: "美业创业者",
            type: "痛点教育",
            cta: "模型",
            offer: "用痛点选题吸引精准客户，再用私域完成转化",
            pain: "内容看起来热闹，但没有导向私信和预约",
            stage: "选题",
            publishTitle: "每天发视频，为什么还是没人咨询？",
            publishAt: "",
            feedback: "",
            createdAt: new Date().toISOString()
          }
        ];
        state.topics.forEach((topic) => topic.script = buildScript(topic));
        saveState();
      }

      function download(name, text, type) {
        const blob = new Blob([text], { type });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = name;
        link.click();
        URL.revokeObjectURL(url);
      }

      function exportCsv() {
        const header = ["编号","选题","目标客户","类型","阶段","导流口令","平台标题","发布时间","反馈"];
        const rows = state.topics.map((topic, index) => [
          index + 1, topic.title, topic.audience, topic.type, topic.stage, topic.cta,
          topic.publishTitle || topic.title, topic.publishAt || "", topic.feedback || ""
        ]);
        const csv = [header, ...rows].map((row) => row.map((cell) => `"${String(cell).replaceAll('"', '""')}"`).join(",")).join("\n");
        download("短视频工作台.csv", "\ufeff" + csv, "text/csv;charset=utf-8");
      }

      document.querySelectorAll(".nav button").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll(".nav button").forEach((item) => item.classList.remove("active"));
          document.querySelectorAll(".view").forEach((view) => view.classList.add("hidden"));
          button.classList.add("active");
          $(`view-${button.dataset.view}`).classList.remove("hidden");
          if (button.dataset.view === "modules") loadPipelineModules();
        });
      });

      document.querySelectorAll(".tabs button").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll(".tabs button").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          activeTemplate = button.dataset.template;
          renderScriptPreview();
        });
      });

      $("pipeline").addEventListener("click", (event) => {
        const moveId = event.target.dataset.move;
        const deleteId = event.target.dataset.delete;
        if (moveId) moveTopic(moveId, Number(event.target.dataset.dir));
        if (deleteId) deleteTopic(deleteId);
      });

      $("addTopicBtn").addEventListener("click", addTopic);
      $("generateScriptBtn").addEventListener("click", () => {
        const input = currentInput();
        $("scriptPreview").textContent = buildScript(input);
        document.querySelector('[data-view="script"]').click();
      });

      $("rewriteSelectedBtn").addEventListener("click", () => {
        const topic = selectedTopic();
        if (!topic) return;
        topic.script = buildScript(topic, activeTemplate);
        topic.stage = "脚本";
        saveState();
      });

      $("topicSelect").addEventListener("change", renderScriptPreview);
      $("copyScriptBtn").addEventListener("click", async () => {
        await navigator.clipboard.writeText($("scriptPreview").textContent);
      });

      $("createLiketongPackageBtn").addEventListener("click", async () => {
        const topic = selectedTopic();
        if (!topic) {
          $("liketongPackageResult").textContent = "请先新增一个选题。";
          return;
        }
        const payload = {
          topic: { ...topic, script: $("scriptPreview").textContent },
          personaRole: $("personaRole")?.value,
          personaTone: $("personaTone")?.value,
          personaOutfit: $("personaOutfit")?.value,
          personaUse: $("personaUse")?.value
        };
        $("liketongPackageResult").textContent = "正在生成素材包...";
        try {
          const response = await fetch("/api/liketong-package", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const result = await response.json();
          if (!response.ok) throw new Error(result.error || "生成失败");
          topic.stage = "素材";
          topic.liketongPackage = result;
          saveState();
          $("liketongPackageResult").textContent = [
            "已生成立客通素材包：",
            result.folderPath,
            "",
            "包含文件：",
            result.files.join("、"),
            "",
            "立客通导出目录：",
            result.outputDir
          ].join("\n");
        } catch (error) {
          $("liketongPackageResult").textContent = `生成失败：${error.message}`;
        }
      });

      $("copyLiketongPathBtn").addEventListener("click", async () => {
        await navigator.clipboard.writeText("D:\\ai-tools\\liketong-ai-employee\\app\\立客通AI员工.exe");
      });

      $("copyLiketongStepsBtn").addEventListener("click", async () => {
        await navigator.clipboard.writeText([
          "1. 在工作台生成口播脚本",
          "2. 把脚本、真人底片、配音文件放入 digital-human-mvp/liketong-inbox",
          "3. 打开立客通 AI 员工",
          "4. 导入真人底片，粘贴脚本或导入配音",
          "5. 生成口型同步视频",
          "6. 导出 MP4 到 digital-human-mvp/liketong-output",
          "7. 回到工作台推进到包装和发布"
        ].join("\\n"));
      });

      document.querySelectorAll(".assetCheck").forEach((box, index) => {
        box.addEventListener("change", () => {
          state.checks[index] = box.checked;
          saveState();
        });
      });

      $("seedBtn").addEventListener("click", seedDemo);
      $("exportJsonBtn").addEventListener("click", () => download("短视频工作台.json", JSON.stringify(state, null, 2), "application/json;charset=utf-8"));
      $("exportCsvBtn").addEventListener("click", exportCsv);
      $("clearBtn").addEventListener("click", () => {
        if (!confirm("确认清空本地工作台数据？")) return;
        state = { topics: [], checks: [] };
        saveState();
      });

      render();
    </script>
  </body>
</html>
